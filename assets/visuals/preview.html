<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Visual Icons Preview</title>
  <style>
    :root {
      --bg: #090513;
      --panel: #120a22;
      --panel-2: #1a1030;
      --border: rgba(144, 112, 210, 0.45);
      --text: #ece6ff;
      --muted: #a89acb;
      --accent: #c4a8ff;
      --ok: #8ff0b2;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      background: radial-gradient(1200px 800px at 20% -10%, #261444 0%, var(--bg) 55%);
      color: var(--text);
      font-family: "Segoe UI", system-ui, sans-serif;
    }

    .wrap {
      width: min(1300px, 96vw);
      margin: 0 auto;
      padding: 20px 0 28px;
    }

    .head {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 14px;
    }

    .title {
      margin: 0;
      font-size: 1.3rem;
      color: #efe8ff;
      font-weight: 700;
      letter-spacing: 0.01em;
    }

    .sub {
      color: var(--muted);
      font-size: 0.93rem;
      line-height: 1.4;
    }

    .stats {
      margin-top: 10px;
      color: var(--muted);
      font-size: 0.85rem;
    }

    .stats .ok {
      color: var(--ok);
      font-weight: 700;
    }

    .groups {
      display: flex;
      flex-direction: column;
      gap: 18px;
      margin-top: 16px;
    }

    .group {
      background: rgba(14, 8, 25, 0.82);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px;
    }

    .group-title {
      margin: 0 0 10px;
      color: var(--accent);
      font-size: 0.95rem;
      letter-spacing: 0.01em;
      font-weight: 700;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
      gap: 10px;
    }

    .card {
      border: 1px solid rgba(124, 96, 184, 0.5);
      border-radius: 10px;
      background: linear-gradient(180deg, rgba(32, 20, 55, 0.8), rgba(24, 15, 40, 0.8));
      padding: 10px;
      min-height: 108px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      cursor: pointer;
      transition: border-color 0.14s ease, transform 0.1s ease, filter 0.14s ease;
    }

    .card:hover {
      border-color: rgba(175, 147, 242, 0.9);
      transform: translateY(-1px);
      filter: brightness(1.05);
    }

    .icon-box {
      width: 64px;
      height: 64px;
      border-radius: 10px;
      border: 1px solid rgba(166, 134, 230, 0.5);
      /* Opaque dark base so transparent PNGs read as in-game UI, not checkerboard */
      background-color: #0c0718;
      background-image: radial-gradient(
        circle at 40% 30%,
        rgba(88, 60, 140, 0.45) 0%,
        #0a0614 75%
      );
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto;
      padding: 3px;
      flex-shrink: 0;
      overflow: hidden;
      box-sizing: border-box;
    }

    .icon-box svg {
      width: 56px;
      height: 56px;
      max-width: 56px;
      max-height: 56px;
      display: block;
      flex-shrink: 0;
    }

    .icon-box img.visual-icon,
    .icon-box img.preview-visual-icon {
      width: 56px;
      height: 56px;
      max-width: 56px;
      max-height: 56px;
      object-fit: contain;
      display: block;
      flex-shrink: 0;
    }

    .icon-box .visual-icon--atlas,
    .icon-box .preview-visual-icon {
      width: 56px;
      height: 56px;
      flex-shrink: 0;
    }

    .icon-box .visual-icon--atlas {
      position: relative;
      overflow: hidden;
      box-sizing: border-box;
    }

    .icon-box .visual-icon--atlas-tile {
      position: absolute;
      left: 0;
      top: 0;
      display: block;
      transform-origin: top left;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      will-change: transform;
    }

    .meta {
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-width: 0;
      text-align: center;
    }

    .id {
      color: #f1ebff;
      font-size: 0.76rem;
      font-weight: 600;
      line-height: 1.25;
      word-break: break-all;
    }

    .tags {
      color: var(--muted);
      font-size: 0.69rem;
      letter-spacing: 0.01em;
    }

    .raw-modal {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 40;
      background: rgba(5, 3, 12, 0.8);
      padding: 24px;
    }

    .raw-modal.open {
      display: flex;
    }

    .raw-modal-card {
      width: min(820px, 96vw);
      max-height: 90vh;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: rgba(10, 7, 20, 0.95);
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .raw-modal-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 0.82rem;
    }

    .raw-modal-head button {
      border: 1px solid rgba(143, 111, 210, 0.55);
      border-radius: 8px;
      background: #120a22;
      color: var(--text);
      padding: 4px 8px;
      cursor: pointer;
    }

    #raw-modal-body {
      width: 100%;
      min-height: 220px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(124, 96, 184, 0.45);
      border-radius: 10px;
      background: #0b0716;
      overflow: auto;
    }

    #raw-modal-body img {
      display: block;
      max-width: 100%;
      height: auto;
    }

    @media (max-width: 860px) {
      .wrap {
        width: 98vw;
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <header class="head">
      <h1 class="title">Preview: All Visual Icons</h1>
      <div class="sub">
        Клик по карточке показывает исходный raw PNG (если для иконки есть связь в манифесте).
      </div>
    </header>

    <div id="stats" class="stats"></div>
    <section id="groups" class="groups"></section>
  </main>

  <aside id="raw-modal" class="raw-modal" aria-hidden="true">
    <div class="raw-modal-card">
      <div class="raw-modal-head">
        <span id="raw-modal-title">Raw asset</span>
        <button id="raw-modal-close" type="button">Close</button>
      </div>
      <div id="raw-modal-body"></div>
    </div>
  </aside>

  <script type="module">
    import { VISUAL_ASSETS } from "./registry.js";
    import { SKILLS_CONFIG } from "../../shared/dist/skills.config.js";
    import { OTHER_CONFIG } from "../../other.config.js";
    import { IMPORT_MANIFEST } from "../import-manifest.js";
    import {
      ASSETS_ATLAS_URL,
      ASSETS_ATLAS_WIDTH,
      ASSETS_ATLAS_HEIGHT,
      ASSETS_ATLAS_REGIONS,
    } from "./assets-atlas.gen.js";
    const manifestRows = IMPORT_MANIFEST;

    /** Иконки только в атласе (нет в VISUAL_ASSETS) — всё равно показываем в превью. */
    const visAssetIds = new Set(Object.keys(VISUAL_ASSETS));
    const entries = Object.entries(VISUAL_ASSETS).map(([id, data]) => ({ id, ...data }));
    const atlasOnlySvg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"></svg>`;
    for (const id of Object.keys(ASSETS_ATLAS_REGIONS)) {
      if (visAssetIds.has(id)) continue;
      entries.push({ id, kind: "icon", family: "game", svg: atlasOnlySvg });
    }

    const groupsEl = document.getElementById("groups");
    const statsEl = document.getElementById("stats");
    const rawModalEl = document.getElementById("raw-modal");
    const rawModalTitleEl = document.getElementById("raw-modal-title");
    const rawModalBodyEl = document.getElementById("raw-modal-body");
    const rawModalCloseEl = document.getElementById("raw-modal-close");

    const rawFileByAssetId = new Map();
    const skillNameByAssetId = new Map();

    const allSkills = [
      ...(SKILLS_CONFIG?.singleRuneCombos || []),
      ...(SKILLS_CONFIG?.dualRuneCombos || []),
      ...(SKILLS_CONFIG?.invokeCombos || []),
      ...(SKILLS_CONFIG?.extraSkillAssets || []),
    ];
    for (const skill of allSkills) {
      if (skill?.id && skill?.asset) {
        if (typeof skill.name === "string" && skill.name) skillNameByAssetId.set(skill.asset, skill.name);
      }
    }
    for (const row of manifestRows) {
      if (!row || row.source !== "asset_atlas") continue;
      if (typeof row.file === "string" && typeof row.assetId === "string" && row.assetId) rawFileByAssetId.set(row.assetId, row.file);
    }

    const comboRuneTitle = Object.fromEntries(OTHER_CONFIG.comboRuneAssets.map((item) => [item.asset, item.title]));
    const fixedTitleByAssetId = Object.fromEntries([
      ...(SKILLS_CONFIG.extraSkillAssets || []).map((item) => [item.asset, item.name]),
      ...OTHER_CONFIG.appIconAssets.map((item) => [item.asset, item.title]),
    ]);

    function assetGroupId(id) {
      if (id.startsWith("game_combo_rune_")) return "game_combo_rune";
      if (id.startsWith("game_skill_rune_") || id === "game_skill_invoke") return "game_base_skill";
      if (id.startsWith("game_skill_duo_")) return "game_skill_duo";
      if (id.startsWith("game_skill_combo_")) return "game_skill_combo";
      if (id.startsWith("game_")) return "game_other";
      if (id.startsWith("app_")) return "app";
      return "game_other";
    }

    const groupTitleMap = {
      game_base_skill: "Base Skills",
      game_combo_rune: "Runes",
      game_skill_duo: "Combo Duo Skills",
      game_skill_combo: "Combo Trio Skills",
      game_other: "Game — Other Icons",
      app: "App — UI Icons",
    };

    function itemTitle(item) {
      return fixedTitleByAssetId[item.id] || comboRuneTitle[item.id] || skillNameByAssetId.get(item.id) || item.id;
    }

    function renderPreviewIconElement(item) {
      const reg = ASSETS_ATLAS_REGIONS[item.id];
      if (reg && ASSETS_ATLAS_URL) {
        const outer = document.createElement("div");
        outer.className = "visual-icon visual-icon--atlas preview-visual-icon";
        outer.setAttribute("role", "img");
        outer.setAttribute("aria-hidden", "true");

        const inner = document.createElement("span");
        inner.className = "visual-icon--atlas-tile";
        inner.style.width = `${reg.w}px`;
        inner.style.height = `${reg.h}px`;
        inner.style.backgroundImage = `url("${ASSETS_ATLAS_URL}")`;
        inner.style.backgroundRepeat = "no-repeat";
        inner.style.backgroundSize = `${ASSETS_ATLAS_WIDTH}px ${ASSETS_ATLAS_HEIGHT}px`;
        inner.style.backgroundPosition = `-${reg.x}px -${reg.y}px`;
        inner.style.transform = "translate(0px, 0px) scale(1)";
        outer.appendChild(inner);

        const fit = () => {
          const b = outer.getBoundingClientRect();
          const w = Math.max(1, Math.round(b.width));
          const h = Math.max(1, Math.round(b.height));
          if (w <= 1 || h <= 1) return false;
          const scale = Math.min(w / reg.w, h / reg.h);
          const fittedW = reg.w * scale;
          const fittedH = reg.h * scale;
          const ox = (w - fittedW) / 2;
          const oy = (h - fittedH) / 2;
          inner.style.transform = `translate(${ox}px, ${oy}px) scale(${scale})`;
          return true;
        };
        let tries = 0;
        const rafFit = () => {
          tries += 1;
          if (!fit() && tries < 12) requestAnimationFrame(rafFit);
        };
        requestAnimationFrame(rafFit);
        if (typeof ResizeObserver !== "undefined") {
          const ro = new ResizeObserver(() => fit());
          ro.observe(outer);
        }
        return outer;
      }

      if (item.source === "svg_icons" && item.path) {
        const img = document.createElement("img");
        img.className = "visual-icon preview-visual-icon";
        img.src = item.path;
        img.alt = "";
        img.draggable = false;
        return img;
      }
      return null;
    }

    function openRawModal(assetId) {
      const file = rawFileByAssetId.get(assetId);
      rawModalTitleEl.textContent = file ? `${assetId} -> raw_png/${file}` : `${assetId} -> raw not found`;
      rawModalBodyEl.textContent = "";
      if (!file) {
        rawModalBodyEl.textContent = "Для этой иконки нет соответствия в assets/import-manifest.js";
      } else {
        const img = document.createElement("img");
        img.src = `/assets/raw_png/${file}`;
        img.alt = file;
        img.onerror = () => {
          rawModalBodyEl.textContent = `Не удалось загрузить /assets/raw_png/${file}`;
        };
        rawModalBodyEl.appendChild(img);
      }
      rawModalEl.classList.add("open");
      rawModalEl.setAttribute("aria-hidden", "false");
    }

    function closeRawModal() {
      rawModalEl.classList.remove("open");
      rawModalEl.setAttribute("aria-hidden", "true");
    }

    function renderCard(item) {
      const card = document.createElement("article");
      card.className = "card";
      card.title = `Show raw: ${item.id}`;
      card.addEventListener("click", () => openRawModal(item.id));

      const box = document.createElement("div");
      box.className = "icon-box";
      const iconEl = renderPreviewIconElement(item);
      if (iconEl) {
        box.appendChild(iconEl);
      } else {
        box.textContent = "🖼️";
      }

      const meta = document.createElement("div");
      meta.className = "meta";
      const id = document.createElement("div");
      id.className = "id";
      id.textContent = itemTitle(item);
      meta.appendChild(id);

      card.appendChild(box);
      card.appendChild(meta);
      return card;
    }

    function render() {
      const grouped = new Map();
      for (const item of entries) {
        const g = assetGroupId(item.id);
        if (!grouped.has(g)) grouped.set(g, []);
        grouped.get(g).push(item);
      }

      groupsEl.textContent = "";
      const groupOrder = [
        "game_base_skill",
        "game_combo_rune",
        "game_skill_duo",
        "game_skill_combo",
        "game_other",
        "app",
      ];

      const comboRuneOrder = [
        "game_combo_rune_frost",
        "game_combo_rune_lightning",
        "game_combo_rune_fire",
      ];
      const baseSkillOrder = ["game_skill_rune_q", "game_skill_rune_w", "game_skill_rune_e", "game_skill_invoke"];

      for (const key of groupOrder) {
        const items = grouped.get(key);
        if (!items || !items.length) continue;
        if (key === "game_base_skill") {
          items.sort((a, b) => baseSkillOrder.indexOf(a.id) - baseSkillOrder.indexOf(b.id));
        } else if (key === "game_combo_rune") {
          items.sort((a, b) => comboRuneOrder.indexOf(a.id) - comboRuneOrder.indexOf(b.id));
        } else {
          items.sort((a, b) => a.id.localeCompare(b.id));
        }

        const section = document.createElement("section");
        section.className = "group";

        const title = document.createElement("h2");
        title.className = "group-title";
        title.textContent = `${groupTitleMap[key] || key} (${items.length})`;

        const grid = document.createElement("div");
        grid.className = "grid";
        for (const item of items) grid.appendChild(renderCard(item));

        section.appendChild(title);
        section.appendChild(grid);
        groupsEl.appendChild(section);
      }

      statsEl.textContent = "";
      const ok = document.createElement("span");
      ok.className = "ok";
      ok.textContent = String(entries.length);
      statsEl.append(ok, " icons shown");
    }

    rawModalCloseEl.addEventListener("click", closeRawModal);
    rawModalEl.addEventListener("click", (event) => {
      if (event.target === rawModalEl) closeRawModal();
    });

    render();
  </script>
</body>
</html>
